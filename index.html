<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Travel Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            ✈️ Planner
        </div>
        <div class="nav-links">
            <a href="#" id="nav-home">Home</a>
            <a href="#" id="nav-about">About Us</a>
            <a href="#" id="nav-feedback">Feedback</a>
            <a href="#" id="nav-login">Login</a>
            <a href="#" id="nav-register">Register</a>
        </div>
    </nav>
    <div id="login-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn" id="close-login">&times;</span>
                <h2>Welcome Back</h2>
                <input type="email" placeholder="Email Address">
                <input type="password" placeholder="Password">
                <button>Login</button>
            </div>
        </div>

        <div id="register-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn" id="close-register">&times;</span>
                <h2>Create Account</h2>
                <input type="text" placeholder="Full Name">
                <input type="email" placeholder="Email Address">
                <input type="password" placeholder="Password">
                <button>Register</button>
            </div>
        </div>
    <div class="container">
        <header>
            <h1>✈️ Smart Travel AI</h1>
            <p>Plan your perfect trip in seconds using AI.</p>
        </header>

        <div class="input-card">
            <div class="input-group">
                <label>Where do you want to go?</label>
                <input type="text" id="destination" placeholder="e.g., Jaipur, Goa, Paris">
            </div>
            
            <div class="row">
                <div class="input-group">
                    <label>How many days?</label>
                    <input type="number" id="days" placeholder="e.g., 3">
                </div>
                <div class="input-group">
                    <label>Total Budget (₹)</label>
                    <input type="number" id="budget" placeholder="e.g., 10000">
                </div>
            </div>

            <div class="input-group">
                <label>Travel Vibe</label>
                <select id="vibe">
                    <option value="Adventure and Action">🚵‍♂️ Adventure & Action</option>
                    <option value="Relaxing and Chill">🏖️ Relaxing & Chill</option>
                    <option value="Culture and History">🏛️ Culture & History</option>
                    <option value="Foodie and Nightlife">🍽️ Foodie & Nightlife</option>
                    <option value="Romantic and Luxury">❤️ Romantic & Luxury</option>
                </select>
            </div>

            <button id="generate-btn">Generate AI Itinerary</button>
        </div>

        <div id="loading" class="hidden">
            <p>🤖 AI is thinking... designing your perfect trip...</p>
        </div>

        <div id="itinerary-output"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
